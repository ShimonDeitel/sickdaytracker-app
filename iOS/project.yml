name: SickDayTracker
options:
  bundleIdPrefix: com.shimondeitel.sickdaytracker
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SickDayTracker:
    type: application
    platform: iOS
    sources:
      - path: SickDayTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sickdaytracker
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SickDayTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SickDayTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SickDayTrackerTests
      - path: SickDayTracker.storekit
    dependencies:
      - target: SickDayTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sickdaytracker.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SickDayTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SickDayTrackerUITests
    dependencies:
      - target: SickDayTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sickdaytracker.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SickDayTracker:
    build:
      targets:
        SickDayTracker: all
        SickDayTrackerTests: [test]
        SickDayTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SickDayTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: SickDayTracker.storekit
      targets:
        - SickDayTrackerTests
        - SickDayTrackerUITests
    archive:
      config: Release
